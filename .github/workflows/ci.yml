name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the other OSes when one fails — a platform-specific break
      # is exactly what this matrix is here to catch.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Tomoshibi.sln

      - name: Build
        run: dotnet build Tomoshibi.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Tomoshibi.sln --configuration Release --no-build --verbosity normal
